services:
  - type: web
    name: crm-agro-demo-api
    runtime: node
    rootDir: backend
    plan: free
    buildCommand: npm install && npx prisma generate && npx prisma db push && npm run seed
    startCommand: npm start
    envVars:
      - key: NODE_ENV
        value: production
      - key: DATABASE_URL
        value: file:/data/dev.db
    disk:
      name: crm-agro-demo-sqlite
      mountPath: /data
      sizeGB: 1
